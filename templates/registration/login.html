{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Organizer login</h2>
  <form method="post">
    {% csrf_token %}
    <table class="search-table">
      {{ form.as_table }}
      <tr>
        <td></td>
        <td><input type="submit" value="Log in"></td>
      </tr>
    </table>
    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
  </form>
</div>
{% endblock %}
