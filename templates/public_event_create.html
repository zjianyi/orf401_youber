{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Create your event</h2>
  <p style="margin: 10px 0 18px; color: #5f6368;">
    Set up a rideshare for a meetup, trip, or any custom event. You can choose
    whether others can discover it as a public event.
  </p>
  <form method="post">
    {% csrf_token %}
    <table class="search-table">
      {{ form.as_table }}
      <tr>
        <td></td>
        <td><input type="submit" value="Create event"></td>
      </tr>
    </table>
  </form>
</div>
{% endblock %}
