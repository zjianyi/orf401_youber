{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Apply to become a driver</h2>
  <p style="margin: 10px 0 18px; color: #5f6368;">
    This application helps us keep rides safe and reliable for attendees.
  </p>
  <form method="post">
    {% csrf_token %}
    <table class="search-table">
      {{ form.as_table }}
      <tr>
        <td></td>
        <td><input type="submit" value="Submit application"></td>
      </tr>
    </table>
  </form>
</div>
{% endblock %}
