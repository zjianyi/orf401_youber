{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YoUber</title>
  <!-- Google Fonts: Roboto -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'main.css' %}">
  <script src="{% static 'main.js' %}"></script>
</head>

<body>

  <!-- Fixed full-screen canvas for particle effects -->
  <canvas id="particles-canvas"></canvas>

  <!-- Shared header with logo, title, and navigation -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="header-brand">
        <img src="{% static 'logo_youber.png' %}" alt="YoUber logo" class="header-logo">
        <span class="header-title">YoUber</span>
      </a>
      <nav class="header-nav">
        <a href="/rides/" class="nav-link">Find a Ride</a>
        <a href="/event/enter/" class="nav-link">Enter Event Code</a>
        <a href="/driver/apply/" class="nav-link">Apply to be a Driver</a>
        <a href="/accounts/login/?next=/organizer/events/new/" class="nav-link">Organizer Login</a>
      </nav>
    </div>
  </header>

  <!-- Page content injected by child templates -->
  <main class="site-main">
    <!-- Django messages (used for code entry + driver dashboard actions) -->
    {% if messages %}
      <div class="messages-wrap">
        {% for message in messages %}
          <div class="message message-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}
    {% endblock %}
  </main>

  <!-- Shared footer -->
  <footer class="site-footer">
    <p>&copy; 2026 YoUber, Inc. All rights reserved.</p>
  </footer>

</body>

</html>
