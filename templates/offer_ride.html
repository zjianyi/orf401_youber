{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Offer a ride for: {{ event.name }}</h2>
  <p style="margin: 10px 0 18px; color: #5f6368;">
    Destination: <strong>{{ event.destination_name }}</strong>
  </p>

  <form method="post">
    {% csrf_token %}
    <table class="search-table">
      {{ form.as_table }}
      <tr>
        <td></td>
        <td><input type="submit" value="Create ride offer"></td>
      </tr>
    </table>
  </form>
</div>
{% endblock %}
