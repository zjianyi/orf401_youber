{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Request sent</h2>
  <p style="margin-top: 10px; color: #5f6368;">
    Your request to join <strong>{{ ride.driver_name }}</strong>'s ride has been sent.
    The driver will accept or reject your request shortly.
  </p>
  <p style="margin-top: 14px;">
    <a class="btn-primary" href="/event/{{ event.code }}/join/">Back to rides</a>
  </p>
</div>
{% endblock %}
