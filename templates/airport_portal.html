{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Airport rides</h2>
  <p style="margin: 10px 0 18px; color: #5f6368;">
    Enter your airport and flight number to find or create a rideshare for that flight.
    For this prototype, you can optionally provide the departure time manually.
  </p>
  <form method="post">
    {% csrf_token %}
    <table class="search-table">
      {{ form.as_table }}
      <tr>
        <td></td>
        <td><input type="submit" value="Find rides"></td>
      </tr>
    </table>
  </form>
</div>
{% endblock %}
