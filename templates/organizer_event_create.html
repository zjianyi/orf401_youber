{% extends "base.html" %}

{% block content %}
<div class="search-form">
  <h2>Create an event invite</h2>
  <p style="margin: 10px 0 18px; color: #5f6368;">
    This page is for event organizers. It creates a unique invite code and link for attendees.
  </p>
  <form method="post">
    {% csrf_token %}
    <table class="search-table">
      {{ form.as_table }}
      <tr>
        <td></td>
        <td><input type="submit" value="Create event"></td>
      </tr>
    </table>
  </form>
</div>
{% endblock %}
