{% extends "base.html" %}

{% block content %}
<div class="hero">
  <div class="hero-card frosted-glass-panel">
    <h2>Enter Event Code</h2>
    <p>Type the invite code your event organizer shared with you.</p>

    <form action="/event/enter/" method="post" style="width: 100%;">
      {% csrf_token %}
      <table class="search-table">
        <tr>
          <td>{{ form.code.label_tag }}</td>
          <td>{{ form.code }}</td>
        </tr>
        <tr>
          <td></td>
          <td><input type="submit" value="Continue &rarr;"></td>
        </tr>
      </table>
    </form>

    <p class="form-back-link">
      Have an invite link? Just click it &mdash; it works automatically.
    </p>
  </div>
</div>
{% endblock %}
